server:
  port: 8080
  servlet:
    context-path: /complementaja

spring:
  application:
    name: "complementaja"
  datasource:
    url: jdbc:postgresql://complementa-ja.ceckwqxpfx84.sa-east-1.rds.amazonaws.com:5432/complementa_ja
